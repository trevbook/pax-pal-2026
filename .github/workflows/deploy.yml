name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "miscellaneous/**"
      - "**.md"
      - ".claude/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Bootstrap SST platform deps
        run: |
          # First attempt creates .sst/platform/ but may fail evaluating config
          bunx sst deploy --stage production --print-logs 2>&1 || true
          # Install platform deps with system bun if the directory was created
          if [ -f .sst/platform/package.json ]; then
            echo "Installing SST platform dependencies..."
            cd .sst/platform && bun install
          fi
      - name: Deploy
        run: bunx sst deploy --stage production --print-logs
